<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ran Talks Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background: #0a0a0a;
        color: #fff;
        font-family: "DM Sans", sans-serif;
        font-weight: 300;
      }

      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #e8197a;
      }

      /* Firefox */
      html {
        scrollbar-width: thin;
        scrollbar-color: #e8197a #0a0a0a;
      }
      /* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
      .hero {
        height: 100vh;
        display: flex;
        padding-top: 68px;
        position: relative;
        overflow: hidden;
      }
      /* Subtle texture */
      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle at 70% 50%,
          rgba(232, 25, 122, 0.04) 0%,
          transparent 60%
        );
        pointer-events: none;
      }
      .hero-left {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px 64px 100px;
        position: relative;
        z-index: 2;
      }
      .hero-headline {
        margin-bottom: 32px;
      }
      .hero-headline-line1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(72px, 8.5vw, 110px);
        font-weight: 900;
        line-height: 0.9;
        color: #f0ede6;
        display: block;
        letter-spacing: -0.01em;
      }
      .hero-headline-line2 {
        font-family: "Playfair Display", serif;
        font-size: clamp(76px, 9vw, 116px);
        font-weight: 700;
        font-style: italic;
        line-height: 0.9;
        color: #e8197a;
        display: block;
        letter-spacing: -0.01em;
      }
      .hero-sub {
        font-size: 16px;
        font-weight: 300;
        color: rgba(240, 237, 230, 0.45);
        max-width: min(560px, 100%);
        line-height: 1.9;
        letter-spacing: 0.01em;
        margin-bottom: 48px;
      }
      .hero-sub em {
        font-style: italic;
        color: rgba(240, 237, 230, 0.65);
      }
      .hero-ctas {
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }
      .btn-youtube {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #f0ede6;
        text-decoration: none;
        transition: color 0.2s;
      }
      .btn-youtube:hover {
        color: rgba(240, 237, 230, 0.7);
      }
      .btn-youtube .arrow {
        color: #e8197a;
      }

      /* Hero right: photo */
      .hero-right {
        width: 44%;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .hero-photo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        display: block;
        /* the dark bg on the photo blends naturally */
        mix-blend-mode: lighten;
        opacity: 0.85;
      }
      /* Left-side gradient fade */
      .hero-photo-fade {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, #0a0a0a 0%, transparent 35%);
        pointer-events: none;
        z-index: 2;
      }

      /* ══════════════════════════════════════
         NAV
      ══════════════════════════════════════ */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        height: 68px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 40px;
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .nav-logo {
        font-family: "Playfair Display", serif;
        font-weight: 700;
        font-size: 17px;
        color: #f0ede6;
        text-decoration: none;
        letter-spacing: -0.01em;
        white-space: nowrap;
      }
      .nav-logo-accent {
        color: #f0ede6;
      }
      .nav-links {
        display: none;
        align-items: center;
        gap: 36px;
        list-style: none;
      }
      .nav-links a {
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(240, 237, 230, 0.5);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: #f0ede6;
      }
      .nav-right {
        display: flex;
        justify-content: flex-end;
        grid-column: 3;
      }
      .btn-subscribe {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #fff;
        background: #e8197a;
        text-decoration: none;
        padding: 9px 20px;
        border-radius: 2px;
        transition: opacity 0.2s;
      }
      .btn-subscribe:hover {
        opacity: 0.85;
      }

      /* ══════════════════════════════════════
         RESPONSIVE
      ══════════════════════════════════════ */

      /* Tablet */
      @media (max-width: 1024px) {
        .hero-left {
          padding: 60px 48px 80px;
        }
        .hero-right {
          width: 40%;
        }
      }

      /* Hamburger (hidden on desktop) */
      .nav-hamburger {
        display: none;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
      }
      .nav-hamburger span {
        display: block;
        width: 22px;
        height: 1.5px;
        background: #f0ede6;
        transition: transform 0.22s ease, opacity 0.22s ease;
      }
      .nav-hamburger.is-open span:nth-child(1) {
        transform: translateY(6.5px) rotate(45deg);
      }
      .nav-hamburger.is-open span:nth-child(2) {
        opacity: 0;
      }
      .nav-hamburger.is-open span:nth-child(3) {
        transform: translateY(-6.5px) rotate(-45deg);
      }

      /* Mobile menu panel (hidden on desktop) */
      .nav-mobile-menu {
        display: none;
        position: fixed;
        top: 68px;
        left: 0;
        right: 0;
        z-index: 99;
        flex-direction: column;
        gap: 40px;
        padding: 40px 28px 48px;
        background: rgba(10, 10, 10, 0.97);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        visibility: hidden;
        opacity: 0;
        transform: translateY(-6px);
        transition: opacity 0.22s ease, transform 0.22s ease, visibility 0s 0.22s;
      }
      .nav-mobile-menu.is-open {
        visibility: visible;
        opacity: 1;
        transform: translateY(0);
        transition-delay: 0s;
      }
      .nav-mobile-links {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }
      .nav-mobile-links a {
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(240, 237, 230, 0.6);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-mobile-links a:hover {
        color: #f0ede6;
      }
      .nav-mobile-menu .btn-subscribe {
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.12em;
        color: rgba(240, 237, 230, 0.6);
      }
      .nav-mobile-menu .btn-subscribe:hover {
        opacity: 1;
        color: #f0ede6;
      }

      /* Mobile nav */
      @media (max-width: 767px) {
        .nav {
          padding: 0 20px;
          grid-template-columns: 1fr auto;
        }
        .nav-links,
        .nav-right {
          display: none;
        }
        .nav-hamburger {
          display: flex;
        }
        .nav-logo-word {
          display: none;
        }
        .nav-mobile-menu {
          display: flex;
        }
      }

      /* Mobile */
      @media (max-width: 767px) {
        .hero {
          flex-direction: column;
          padding-top: 0;
          align-items: center;
          justify-content: center;
        }
        .hero-left {
          flex: unset;
          width: 100%;
          justify-content: center;
          padding: 48px 28px 40px;
          z-index: 3;
        }
        .hero-headline-line1 {
          font-size: clamp(52px, 16vw, 72px);
        }
        .hero-headline-line2 {
          font-size: clamp(56px, 17vw, 76px);
        }
        .hero-sub {
          max-width: 100%;
          margin-bottom: 36px;
        }
        .hero-right {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- ════════════ NAV ════════════ -->
    <nav class="nav">
      <a href="/" class="nav-logo">
        <span class="nav-logo-accent">R</span><span class="nav-logo-word">an</span><span class="nav-logo-accent">T</span><span class="nav-logo-word">alks</span><span class="nav-logo-accent">D</span><span class="nav-logo-word">esign</span>
      </a>
      <ul class="nav-links">
        <li><a href="pages/articles.html">Writing</a></li>
        <li><a href="pages/episodes.html">Podcast</a></li>
        <li><a href="pages/speaking.html">Speaking</a></li>
        <li><a href="pages/about.html">About</a></li>
      </ul>
      <div class="nav-right">
        <a
          href="https://www.youtube.com/@rantalksdesign?sub_confirmation=1"
          target="_blank"
          rel="noopener"
          class="btn-subscribe"
          >Subscribe</a
        >
      </div>
      <button class="nav-hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
    <div class="nav-mobile-menu" aria-hidden="true">
      <ul class="nav-mobile-links">
        <li><a href="pages/articles.html">Writing</a></li>
        <li><a href="pages/episodes.html">Podcast</a></li>
        <li><a href="pages/speaking.html">Speaking</a></li>
        <li><a href="pages/about.html">About</a></li>
      </ul>
      <a
        href="https://www.youtube.com/@rantalksdesign?sub_confirmation=1"
        target="_blank"
        rel="noopener"
        class="btn-subscribe"
        >Subscribe</a
      >
    </div>

    <!-- ════════════ HERO ════════════ -->
    <section class="hero">
      <!-- Left: headline copy -->
      <div class="hero-left">
        <div class="hero-headline">
          <span class="hero-headline-line1">Design</span>
          <span class="hero-headline-line2">builds.</span>
        </div>

        <div class="hero-rule"></div>

        <p class="hero-sub">
          Videos, essays, and frameworks for builders who take design seriously.
        </p>

        <div class="hero-ctas">
          <a href="https://www.youtube.com/@rantalksdesign" target="_blank" rel="noopener" class="btn-youtube">Watch on YouTube <span class="arrow">↗</span></a>
        </div>
      </div>

      <!-- Right: photo -->
      <div class="hero-right">
        <img
          src="img/ran-headshot-full.png"
          alt="Ran Liu"
          class="hero-photo"
          onerror="
            this.style.display = 'none';
            this.nextElementSibling.style.display = 'flex';
          "
        />

        <div class="hero-photo-fade"></div>
      </div>
    </section>
    <script>
      const hamburger = document.querySelector(".nav-hamburger");
      const mobileMenu = document.querySelector(".nav-mobile-menu");
      hamburger.addEventListener("click", () => {
        const isOpen = hamburger.classList.toggle("is-open");
        mobileMenu.classList.toggle("is-open", isOpen);
        hamburger.setAttribute("aria-expanded", isOpen);
        mobileMenu.setAttribute("aria-hidden", !isOpen);
      });
    </script>
  </body>
</html>
